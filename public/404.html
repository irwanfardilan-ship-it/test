<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafrex/spa-github-pages
      // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to load the correct url for the SPA.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
    <script type="text/javascript">
      // If the current URL is not the root, redirect to index.html with the path as a query param
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // We don't want to infinite loop if we are already at index.html
      if (path.split('/').pop() !== 'index.html') {
        window.location.replace(
          window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '') +
          path.split('/').slice(0, -1).join('/') + '/index.html?p=' + path.split('/').pop().replace(/&/g, '~and~') +
          (search ? '&q=' + search.slice(1).replace(/&/g, '~and~') : '') +
          hash
        );
      }
    </script>
  </head>
  <body>
  </body>
</html>
